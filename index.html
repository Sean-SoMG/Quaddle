<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quaddle Solo Digital</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero panel">
      <h1>Quaddle Solo Digital</h1>
    </header>

    <section id="setup" class="panel">
      <h2>Start Game</h2>
      <label for="difficulty">Digital Opponent</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="standard" selected>Standard</option>
        <option value="expert">Expert</option>
      </select>
      <button id="start-btn">Start</button>
    </section>

    <section id="game" class="hidden">
      <div class="scoreboard panel">
        <div class="score-pill player-pill">
          <span>Player</span>
          <strong id="player-score">0</strong>
        </div>
        <div class="score-center">
          <p><strong>Turn:</strong> <span id="turn-label"></span></p>
          <p><strong>Phase:</strong> <span id="phase-label">Phase 1</span></p>
          <p><strong>Cards left:</strong> <span id="cards-left"></span></p>
        </div>
        <div class="score-pill ai-pill">
          <span>Opponent</span>
          <strong id="ai-score">0</strong>
        </div>
      </div>

      <div class="top-controls compact-row">
        <div class="panel card-panel">
          <h2>Card</h2>
          <div id="card-preview" class="card-preview"></div>
          <div class="control-row">
            <button id="rotate-btn">Rotate 90°</button>
            <button id="place-btn">Place</button>
          </div>
        </div>

        <div class="panel movement-panel">
          <h2>Move</h2>
          <div class="dpad-grid">
            <button id="move-up">↑</button>
            <button id="move-left">←</button>
            <button id="move-down">↓</button>
            <button id="move-right">→</button>
          </div>
        </div>
      </div>

      <div id="board" class="board" aria-label="Game board"></div>
      <p id="ai-banner" class="ai-banner hidden">Opponent is planning move…</p>

      <p id="hint" class="hint">Tap/click to place. Right click rotates on PC.</p>
    </section>

    <section id="result" class="panel hidden">
      <h2>Game Over</h2>
      <p id="result-text"></p>
      <button id="restart-btn">Play Again</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
