<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quaddle Solo Digital</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Quaddle Solo Digital</h1>

    <section id="setup" class="panel">
      <h2>Start Game</h2>
      <label for="difficulty">Digital Opponent</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="standard" selected>Standard</option>
        <option value="expert">Expert</option>
      </select>
      <button id="start-btn">Start</button>
    </section>

    <section id="game" class="hidden">
      <div class="status-grid">
        <div class="panel">
          <h2>Status</h2>
          <p><strong>Turn:</strong> <span id="turn-label"></span></p>
          <p><strong>Phase:</strong> <span id="phase-label">Phase 1</span></p>
          <p><strong>Cards left:</strong> <span id="cards-left"></span></p>
          <p><strong>Player score:</strong> <span id="player-score">0</span></p>
          <p><strong>Opponent score:</strong> <span id="ai-score">0</span></p>
        </div>

        <div class="panel">
          <h2>Current Card</h2>
          <p><strong>Shape:</strong> <span id="card-shape">-</span></p>
          <p><strong>Rotation:</strong> <span id="rotation-label">0°</span></p>
          <div id="card-preview" class="card-preview"></div>
          <button id="rotate-btn">Rotate 90°</button>
        </div>
      </div>

      <div id="board" class="board" aria-label="Game board"></div>
      <p id="hint" class="hint">Click a cell to place the top-left of the current shape.</p>
    </section>

    <section id="result" class="panel hidden">
      <h2>Game Over</h2>
      <p id="result-text"></p>
      <button id="restart-btn">Play Again</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
